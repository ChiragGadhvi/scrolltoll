name: scrolltoll
description: "ScrollToll - Screen Time Money Waster Calculator"
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  usage_stats: ^1.0.4
  flutter_local_notifications: ^17.1.2
  home_widget: ^0.9.0
  share_plus: ^9.0.0
  fl_chart: ^0.68.0
  intl: ^0.19.0
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  path_provider: ^2.1.2
  timezone: ^0.9.4
  device_apps: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/ic_launcher.png"
  min_sdk_android: 23
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/ic_launcher.png"

flutter_native_splash:
  color: "#000000"
  image: assets/ic_splash.png
  android: true
  ios: false
  android_12:
    image: assets/ic_splash.png
    color: "#000000"
    icon_background_color: "#000000"

flutter:
  uses-material-design: true
  assets:
    - assets/ic_launcher.png
    - assets/jar/
